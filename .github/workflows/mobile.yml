name: Mobile CI/CD Gate

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'apps/mobile/**'
      - 'shared/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/mobile/package-lock.json'

      - name: Install Mobile Dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: Run Typecheck
        run: |
          cd apps/mobile
          npx tsc --noEmit

      - name: Verify Expo Export Build
        run: |
          cd apps/mobile
          npx expo export --platform web --if-present
